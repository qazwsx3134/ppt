<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簡報傳送門 · Presentations Portal</title>
<style>
  :root {
    --bg: #0c1320;
    --bg2: #111c2e;
    --panel: #16233a;
    --ink: #eef3fb;
    --muted: #9fb2cc;
    --line: #26384f;
    --accent: #5ad1c4;
    --accent2: #7aa2ff;
    --gold: #f5c451;
    --serif: "Noto Serif TC", "Songti TC", "STSong", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: var(--sans);
    background: radial-gradient(1200px 600px at 80% -10%, rgba(122, 162, 255, 0.12), transparent),
                radial-gradient(900px 500px at 0% 110%, rgba(90, 209, 196, 0.1), transparent),
                var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 4rem 2rem;
  }

  .container {
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  header {
    margin-bottom: 3rem;
  }

  .badge {
    display: inline-flex;
    gap: .5rem;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: .5rem 1.1rem;
    font-size: .85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .badge .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }

  h1 {
    font-family: var(--serif);
    font-size: 3rem;
    font-weight: 700;
    letter-spacing: .02em;
    background: linear-gradient(135deg, var(--ink), var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 1rem;
  }

  .subtitle {
    font-size: 1.2rem;
    color: var(--accent2);
    font-weight: 500;
  }

  .rule {
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    margin: 2rem 0;
  }

  /* ---------- Portal Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
    margin-top: 1rem;
  }

  @media (min-width: 768px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 2rem;
    text-decoration: none;
    color: inherit;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(90, 209, 196, 0.05), rgba(122, 162, 255, 0.05));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .card:hover {
    transform: translateY(-5px);
    border-color: var(--accent);
    box-shadow: 0 10px 30px rgba(90, 209, 196, 0.1);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card-header {
    position: relative;
    z-index: 1;
  }

  .card-tag {
    font-size: .75rem;
    letter-spacing: .2em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 0.8rem;
    display: block;
  }

  .card h3 {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 1rem;
    color: var(--ink);
    transition: color 0.3s ease;
  }

  .card:hover h3 {
    color: var(--accent);
  }

  .card p {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .card-footer {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--accent2);
    font-weight: 500;
    margin-top: auto;
  }

  .arrow {
    font-size: 1.2rem;
    transition: transform 0.3s ease;
  }

  .card:hover .arrow {
    transform: translateX(5px);
  }

  /* Placeholder card for future presentations */
  .card.placeholder {
    border-style: dashed;
    background: transparent;
    opacity: 0.6;
    justify-content: center;
    align-items: center;
    cursor: default;
  }

  .card.placeholder:hover {
    transform: none;
    border-color: var(--line);
    box-shadow: none;
  }

  .card.placeholder p {
    margin: 0;
    text-align: center;
    font-family: var(--serif);
    font-size: 1.2rem;
    color: var(--muted);
  }

  footer {
    margin-top: 4rem;
    border-top: 1px solid var(--line);
    padding-top: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    color: var(--line);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="badge"><span class="dot"></span>簡報平台 · Presentations Portal</div>
    <h1>我的學術與技術簡報</h1>
    <div class="subtitle">AI Agent 環境設計、工程實踐與更多技術分享</div>
    <div class="rule"></div>
  </header>

  <main class="grid">
    <!-- Slide 1 -->
    <a href="harness-and-workflows/" class="card">
      <div class="card-header">
        <span class="card-tag">Research & Engineering</span>
        <h3>鷹架工程與動態工作流程</h3>
        <p>AI Agent 環境設計的理論框架與工程實踐，探討為什麼工作環境比模型大腦更關鍵。</p>
      </div>
      <div class="card-footer">
        <span>進入簡報 Slide Deck</span>
        <span class="arrow">→</span>
      </div>
    </a>

    <!-- Placeholder for Slide 2 -->
    <div class="card placeholder">
      <p>＋ 待續，新增資料夾即自動擴充</p>
    </div>
  </main>

  <footer>
    <div>Harness Engineering × Dynamic Workflows</div>
    <div>© 2026 peter</div>
  </footer>
</div>

</body>
</html>
